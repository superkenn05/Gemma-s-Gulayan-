query ListAllProducts @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public.") {
  products {
    id
    name
    description
    price
    unit
    inStock
    imageUrl
    category {
      name
    }
  }
}

query MyOrders @auth(level: USER, insecureReason: "This operation lists orders for the current user.") {
  orders(where: {userId: {eq_expr: "auth.uid"}}) {
    id
    createdAt
    status
    totalAmount
    deliveryOption
    deliveryAddress
    deliveryDate
    pickupTime
    orderItems {
      quantity
      priceAtOrder
      product {
        name
        unit
      }
    }
  }
}

mutation CreateProduct($name: String!, $price: Float!, $unit: String!, $categoryId: UUID) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users. User ID is not required for product creation but could be added later for ownership.") {
  product_insert(data: {
    name: $name,
    price: $price,
    unit: $unit,
    createdAt_expr: "request.time",
    categoryId: $categoryId,
    inStock: true # Assuming new products are in stock by default
  })
}

mutation UpdateMyProfile($displayName: String, $address: String, $phoneNumber: String) @auth(level: USER, insecureReason: "This operation updates the current user's profile.") {
  user_update(
    key: {id_expr: "auth.uid"},
    data: {
      displayName: $displayName,
      address: $address,
      phoneNumber: $phoneNumber
    }
  )
}